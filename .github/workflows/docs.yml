name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install

      - name: Build documentation
        run: poetry run poe docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/site/
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Only deploy from main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: docs-to-deploy

      - name: Configure git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Switch to gh-pages branch
        run: git checkout gh-pages

      - name: Clean old documentation
        run: |
          # Keep .git and .gitignore
          find . -maxdepth 1 -not -name '.git*' -not -name 'docs-to-deploy' -exec rm -rf {} + || true

      - name: Deploy new documentation
        run: |
          cp -r docs-to-deploy/* .
          touch .nojekyll
          git add .
          git commit -m "docs: build from commit ${{ github.sha }}" || echo "No changes to commit"

      - name: Push to gh-pages
        run: git push origin gh-pages
